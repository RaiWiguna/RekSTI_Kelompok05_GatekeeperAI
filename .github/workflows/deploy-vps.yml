name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "infra/**"
      - "packages/**"
      - "services/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Run pnpm db:seed after deploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-vps-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend and infra to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
      RUN_SEED: ${{ github.event.inputs.run_seed || 'false' }}
      COMPOSE_FILE: infra/docker/docker-compose.vps.yml
      ENV_FILE: infra/deployment/.env.vps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_USER"
          test -n "$VPS_PROJECT_DIR"
          test -n "$SSH_PRIVATE_KEY"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Prepare VPS project directory
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "PROJECT_DIR='$VPS_PROJECT_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$PROJECT_DIR"
          REMOTE

      - name: Sync repository to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".turbo/" \
            --exclude ".next/" \
            --exclude "dist/" \
            --exclude "build/" \
            --exclude ".env" \
            --exclude ".env.local" \
            --exclude ".env.*.local" \
            --exclude "infra/deployment/.env.vps" \
            -e "ssh -i ~/.ssh/deploy_key -p $VPS_PORT" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_PROJECT_DIR/"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "PROJECT_DIR='$VPS_PROJECT_DIR' RUN_SEED='$RUN_SEED' COMPOSE_FILE='$COMPOSE_FILE' ENV_FILE='$ENV_FILE' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$PROJECT_DIR"

          test -f "$ENV_FILE"

          docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" up -d postgres redis
          docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" build api migrate
          docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" run --rm migrate
          docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" up -d api nginx

          if [ "$RUN_SEED" = "true" ]; then
            docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" run --rm api pnpm db:seed
          fi

          docker compose -f "$COMPOSE_FILE" --env-file "$ENV_FILE" ps
          docker image prune -f
          REMOTE
