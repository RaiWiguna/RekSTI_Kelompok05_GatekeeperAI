services:
  postgres:
    image: postgres:16
    container_name: gatekeeper-postgres
    environment:
      POSTGRES_DB: gatekeeper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gatekeeper-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:

